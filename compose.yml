services:
  postgres:
    image: postgres:16-alpine
    container_name: rateio-contas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rateio_contas
      POSTGRES_USER: rateio
      POSTGRES_PASSWORD: rateio
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
